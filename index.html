<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Team Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {f
  --bg: #f8f9fa; /* Light background */
  --bg2: #e9ecef; /* Slightly darker light background for filter bar */
  --card: #ffffff; /* White cards */
  --border: rgba(0,0,0,0.1); /* Light border */
  --neon: #00a88e; /* Darker teal for contrast */
  --accent: #5a00d9; /* Darker purple for contrast */
  --text: #212529; /* Dark text */
  --muted: #6c757d; /* Muted dark text */
  --muted2: #adb5bd; /* Lighter muted text */
  --success: #28a745; /* Standard green */
  --danger: #dc3545; /* Standard red */
  --warn: #ffc107; /* Standard yellow */
  --purple: #6f42c1; /* Standard purple */
  --pink: #e83e8c; /* Standard pink */
  --radius: 16px;
  --shadow: 0 4px 16px rgba(0,0,0,0.1); /* Lighter shadow */
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background Decoration */
.bg-glow {
  position: fixed; top: -10%; right: -10%; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(112,0,255,0.05) 0%, transparent 70%); /* Lighter glow */
  z-index: -1; pointer-events: none;
}

/* Header */
.header {
  height: 64px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; /* Changed to space-between */
  padding: 0 32px; background: rgba(255,255,255,0.95); /* Light background */
  backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100;
}
.header-left { /* New container for logo and title */
  display: flex; align-items: center; gap: 12px;
}
.petpooja-logo {
  height: 36px; /* Adjust as needed */
  width: auto;
}
.logo {
  font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); /* Changed to accent for better contrast */
}
.live-status { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--success); }
.live-status span { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

/* Filters */
.filters {
  padding: 16px 32px; background: var(--bg2); border-bottom: 1px solid var(--border); /* Light background */
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.f-group { display: flex; flex-direction: column; gap: 4px; }
.f-group label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; } /* Muted dark text */
select, input {
  background: #eef1f5; border: 1px solid var(--border); color: var(--text); /* Light background, dark text */
  padding: 8px 12px; border-radius: 8px; font-size: 12px; outline: none; transition: 0.2s;
}
select:focus, input:focus { border-color: var(--accent); } /* Accent border on focus */
.btn {
  background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 10px; /* Accent button */
  font-weight: 700; border: none; cursor: pointer; transition: 0.2s; align-self: flex-end;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(112,0,255,0.3); } /* Accent shadow */

/* Dashboard Layout */
.main { padding: 32px; display: flex; flex-direction: column; gap: 24px; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px; }
.kpi {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); /* White card */
  padding: 24px; position: relative; overflow: hidden;
}
.kpi::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent); opacity: 0.5; } /* Accent line */
.kpi-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; } /* Muted dark text */
.kpi-val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; color: var(--text); } /* Dark text */
.kpi-sub { font-size: 11px; font-weight: 600; color: var(--muted); } /* Muted dark text */
.kpi.neon .kpi-val { color: var(--neon); } /* Neon value */
.kpi.neon::after { background: var(--neon); } /* Neon line */
.kpi.danger .kpi-val { color: var(--danger); } /* Danger value */
.kpi.danger::after { background: var(--danger); } /* Danger line */
.kpi.warn .kpi-val { color: var(--warn); } /* Warn value */
.kpi.warn::after { background: var(--warn); } /* Warn line */

/* Panels */
.grid-row { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); } /* White panel */
.panel-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.panel-t { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); } /* Dark text */

/* Tables */
.tbl-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { text-align: left; padding: 12px; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); background: #f0f2f5; } /* Light header background */
.tbl td { padding: 14px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); color: var(--text); } /* Dark text, light border */
.tbl tr:hover td { background: rgba(0,0,0,0.03); } /* Light hover background */
.rank-box { width: 24px; height: 24px; background: rgba(0,0,0,0.08); color: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; } /* Light rank box */

/* Chart Wrap */
.chart-container { position: relative; height: 260px; }

/* Loader Overlay */
#overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; } /* Light background */
.spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top-color: var(--neon); border-radius: 50%; animation: spin 0.8s linear infinite; } /* Light spinner border */
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 1400px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .grid-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="overlay"> <!-- Loader -->
  <div class="spinner"></div>
  <div style="font-family:Syne; letter-spacing: 2px; color: var(--text);">SYNCING LIVE DATA</div>
</div>

<div class="header">
  <div class="header-left">
    <img src="https://via.placeholder.com/150x50?text=Petpooja+Logo" alt="Petpooja Logo" class="petpooja-logo">
    <div class="logo">INVENTORY.DASH</div>
  </div>
  <div class="header-right">
    <div class="live-status" id="l-stat"><span></span> LIVE DATA</div>
  </div>
</div>

<div class="filters">
  <div class="f-group"><label>Trainer</label><select id="f-trainer"><option value="">All Trainers</option></select></div>
  <div class="f-group"><label>City</label><select id="f-city"><option value="">All Cities</option></select></div>
  <div class="f-group"><label>Status</label><select id="f-status"><option value="">All Status</option></select></div>
  <div class="f-group"><label>Date From</label><input type="date" id="f-from" /></div>
  <div class="f-group"><label>Date To</label><input type="date" id="f-to" /></div>
  <button class="btn" onclick="applyFilters()">UPDATE VIEW</button>
</div>

<div class="main">
  <div class="kpi-grid" id="kpi-row"></div>

  <div class="grid-row">
    <div class="panel">
      <div class="panel-h"><div class="panel-t">Daily Training Performance</div></div>
      <div class="chart-container"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="panel-t">Top Trainers</div></div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Rank</th><th>Name</th><th>Done</th></tr></thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-h"><div class="panel-t">City-Wise Training Distribution</div></div>
    <div class="chart-container"><canvas id="cityChart"></canvas></div>
  </div>

  <div class="panel">
    <div class="panel-h"><div class="panel-t">Trainer Training Mode Matrix</div></div>
    <div class="tbl-wrap">
      <table class="tbl" style="font-size: 11px;">
        <thead>
          <tr id="matrix-head">
            <th>Trainer</th>
            <th>Physical</th>
            <th>Re-training</th>
            <th>Virtual</th>
            <th>Feedback</th>
            <th>Support</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="matrix-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHoSQQZ7IzKxkUhJtsrli6cSo00VR1q3TVlCTBdOrbJV8xEZaL2GUtc4SdjxEaWTq4ZQ/exec';

let allData = [];
let filteredData = [];
let charts = {};

const TRAINER_LIST = ["SADIKUL MALLICK", "DEVENDRA PRASAD", "GAUTAM M", "DEEPAK PATEL", "KRUNAL MAHULKAR", "PRABHU V", "VIGNESH TN", "NEERAJ KUMAR1", "KUNAL ARSEKAR", "ANTAREKSH KAKARIYA", "PRAKHAR TIWARI", "SHUBHASHISH RAI", "ANKIT DAS", "MANOJ SINGH", "VIJAY MAHTO", "AAKASH VAMJA", "ANIKET SHIRFULE", "VASIM MOHAMMED", "KEYUR KADU", "NOMAN KHAN", "LAXMISAI MUDUNURI", "RAGHU PILLAMARAPU", "SHARATH S", "ABDUL REHMAN", "SHAHIDALI SHAIKH", "SANTHOSH KUMAR", "VIKRANT JOON", "GLADSON ANTO", "NIBHUN T", "DASTAGIR ALAM", "NIHAL KA", "ARPIT DUBEY"];
const TRAINING_MODES = ["Virtual", "Physical Visit", "Physical Re-training", "Feedback Visit", "Out of Station Visit", "Incomplete Physical Visit", "OFS (On-Field Support)"];
const STATUS_LIST = ["Done", "Close", "Re-schedule", "Not related to inventory/Done by someone", "Tech concern", "Need other languge / Physical visit"];

async function init() {
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();
    allData = normalize(json.data);
    
    populateFilters();
    setDefaultDates();
    applyFilters();
    
    document.getElementById('overlay').style.display = 'none';
  } catch (e) {
    console.error("Load failed", e);
    alert("Failed to connect to Google Sheet. Ensure Apps Script is deployed.");
  }
}

function normalize(raw) {
  if (!raw || raw.length === 0) return [];
  
  // Get all header keys and normalize them (lowercase, no spaces) to find columns accurately
  const headers = Object.keys(raw[0]);
  const headerMap = {};
  headers.forEach(h => {
    headerMap[h.toLowerCase().replace(/\s+/g, '')] = h;
  });

  return raw.map(r => {
    const get = (...variants) => {
      for (let v of variants) {
        const normV = v.toLowerCase().replace(/\s+/g, '');
        const actualKey = headerMap[normV];
        if (actualKey && r[actualKey] !== undefined && String(r[actualKey]).trim() !== '') {
          return String(r[actualKey]).trim();
        }
      }
      return '';
    };

    // Date Extraction Logic
    let rawDate = get('date', 'Timestamp', 'dateValue');
    let dateObj = null;

    if (rawDate) {
      // Handle M/D/YYYY HH:mm:ss or M/D/YYYY
      const mdy = rawDate.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (mdy) {
        dateObj = `${mdy[3]}-${mdy[1].padStart(2, '0')}-${mdy[2].padStart(2, '0')}`;
      } else {
        // Handle 21/Mar/26
        const monthMap = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
        const dmy = rawDate.match(/^(\d{1,2})\/([A-Za-z]{3})\/(\d{2})$/);
        if (dmy) dateObj = `20${dmy[3]}-${monthMap[dmy[2]] || '01'}-${dmy[1].padStart(2, '0')}`;
        else if (rawDate.includes('-')) dateObj = rawDate.split('T')[0];
      }
    }

    return {
      date: dateObj,
      trainer: get('agentname', 'trainername', 'trainer').toUpperCase(),
      city: get('restaurantname', 'cityname', 'city'),
      status: get('status1', 'status'),
      mode: get('category', 'trainingmode', 'mode'),
      lang: get('Languages', 'Language', 'Virtual Language')
    };
  }).filter(r => r.trainer && r.date);
}

function setDefaultDates() {
  const now = new Date();
  const firstDay = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
  const today = now.toISOString().split('T')[0];
  document.getElementById('f-from').value = firstDay;
  document.getElementById('f-to').value = today;
}

function populateFilters() {
  const fill = (id, key, hardcodedList = []) => {
    const sel = document.getElementById(id);
    let vals = [...new Set(allData.map(r => r[key]).filter(Boolean))];
    if (hardcodedList.length > 0) {
      vals = [...new Set([...vals, ...hardcodedList.map(v => v.toUpperCase())])];
    }
    vals.sort();
    vals.forEach(v => sel.add(new Option(v, v)));
  };
  fill('f-trainer', 'trainer', TRAINER_LIST);
  fill('f-city', 'city');
  fill('f-status', 'status', STATUS_LIST);
}

function applyFilters() {
  const t = document.getElementById('f-trainer').value;
  const c = document.getElementById('f-city').value;
  const s = document.getElementById('f-status').value;
  const fr = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;

  filteredData = allData.filter(r => {
    if (t && r.trainer !== t) return false;
    if (c && r.city !== c) return false;
    if (s && r.status !== s) return false;
    if (fr && r.date < fr) return false;
    if (to && r.date > to) return false;
    return true;
  });

  render();
}

function render() {
  renderKPIs();
  renderMainChart();
  renderCityChart();
  renderLeaderboard();
  renderMatrix();
}

function renderKPIs() {
  const total = filteredData.length;
  
  // 1. Total Done: Any ticket that has a 'Done' status
  const totalDone = filteredData.filter(r => 
    r.status && r.status.toLowerCase() === 'done'
  ).length;

  // 2. Virtual Done: Status is 'Done' AND Mode is 'Virtual'
  const doneVirtual = filteredData.filter(r => 
    r.status && r.status.toLowerCase() === 'done' && 
    r.mode && r.mode.toLowerCase().includes('virtual')
  ).length;

  // 3. Physical Visit: Status is 'Done' AND Mode is 'Physical Visit'
  const physicalVisit = filteredData.filter(r => 
    r.status && r.status.toLowerCase() === 'done' && 
    r.mode && r.mode.toLowerCase().includes('physical visit')
  ).length;

  // 4. Close/Not Related: Adjusting these based on typical sheet values
  const close = filteredData.filter(r => r.status && r.status.toLowerCase() === 'close').length;
  const notRelated = filteredData.filter(r => r.status && r.status.toLowerCase().includes('not related')).length;
  
  const trainers = new Set(filteredData.map(r => r.trainer)).size;

  const kpis = [
    { label: 'Total Ticket', val: total, color: '' },
    { label: 'Done', val: totalDone, color: 'neon' },
    { label: 'Close', val: close, color: 'danger' },
    { label: 'Not Related', val: notRelated, color: 'warn' },
    { label: 'Virtual Done', val: doneVirtual, color: '' },
    { label: 'Physical Visit', val: physicalVisit, color: '' },
    { label: 'Trainer', val: trainers, color: 'neon' }
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi ${k.color}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val">${k.val.toLocaleString()}</div>
      <div class="kpi-sub">${total > 0 ? (k.val / total * 100).toFixed(1) : 0}%</div>
    </div>
  `).join('');
}
function renderMainChart() {
  const days = {};
  filteredData.forEach(r => { days[r.date] = (days[r.date] || 0) + 1; });
  const labels = Object.keys(days).sort();
  const data = labels.map(l => days[l]);

  if (charts.main) charts.main.destroy();
  charts.main = new Chart(document.getElementById('mainChart'), {
    type: 'line',
    data: {
      labels: labels.map(l => l.split('-').slice(1).join('/')),
      datasets: [{
        label: 'Daily Training', /* Chart label */
        data: data, /* Chart data */
        borderColor: '#00a88e', /* Darker teal for light background */
        backgroundColor: 'rgba(0,168,142,0.1)', /* Lighter gradient for light background */
        fill: true,
        tension: 0.4,
        borderWidth: 3,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#4a5568' } }, /* Darker ticks */
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { color: '#4a5568' } } /* Lighter grid, darker ticks */
      }
    }
  });
}

function renderCityChart() {
  const cities = {};
  filteredData.forEach(r => { if(r.city) cities[r.city] = (cities[r.city] || 0) + 1; });
  const sorted = Object.entries(cities).sort((a,b) => b[1] - a[1]).slice(0, 15);

  if (charts.city) charts.city.destroy();
  charts.city = new Chart(document.getElementById('cityChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(s => s[0]),
      datasets: [{
        label: 'Tickets',
        data: sorted.map(s => s[1]),
        backgroundColor: '#5a00d9', /* Darker accent for light background */
        borderRadius: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' } } /* Lighter grid */
      }
    }
  });
}

function renderLeaderboard() {
  const tMap = {};
  filteredData.forEach(r => {
    if (!tMap[r.trainer]) tMap[r.trainer] = 0;
    if (r.status === 'Done') tMap[r.trainer]++;
  });

  const sorted = Object.entries(tMap).sort((a,b) => b[1] - a[1]).slice(0, 10);
  document.getElementById('leaderboard-body').innerHTML = sorted.map((s, i) => `
    <tr>
      <td><div class="rank-box">${i+1}</div></td>
      <td style="font-weight:600;">${s[0]}</td>
      <td style="color:var(--neon); font-weight:700;">${s[1]}</td>
    </tr>
  `).join('');
}

function renderMatrix() {
  const map = {};
  filteredData.forEach(r => {
    if (!map[r.trainer]) map[r.trainer] = { "Physical Visit": 0, "Physical Re-training": 0, "Virtual": 0, "Feedback Visit": 0, "OFS (On-Field Support)": 0, "Total": 0 };
    if (map[r.trainer][r.mode] !== undefined) map[r.trainer][r.mode]++;
    map[r.trainer]["Total"]++;
  });

  const sorted = Object.entries(map).sort((a,b) => b[1].Total - a[1].Total);
  document.getElementById('matrix-body').innerHTML = sorted.map(s => `
    <tr>
      <td style="font-weight:600;">${s[0]}</td>
      <td>${s[1]["Physical Visit"]}</td>
      <td>${s[1]["Physical Re-training"]}</td>
      <td>${s[1]["Virtual"]}</td>
      <td>${s[1]["Feedback Visit"]}</td>
      <td>${s[1]["OFS (On-Field Support)"]}</td>
      <td style="font-weight:800; color:var(--neon);">${s[1].Total}</td>
    </tr>
  `).join('');
}

window.onload = init;
</script>
</body>
</html>
