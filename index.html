<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Performance | Donezo Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-main: #f8faf9;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --primary-green: #1d5c3d; /* Donezo Deep Green */
            --accent-green: #74c69d; /* Progress Bar Green */
            --text-main: #1a1c1e;
            --text-muted: #626a6d;
            --border: #eef2f0;
            --radius-lg: 24px;
            --radius-sm: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 24px;
            line-height: 1.5;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 { font-size: 24px; font-weight: 700; color: var(--primary-green); }

        /* Filters Bar */
        .filters {
            display: flex;
            gap: 16px;
            background: var(--card-bg);
            padding: 16px 24px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-bottom: 32px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .f-group { display: flex; flex-direction: column; gap: 6px; }
        .f-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        
        select, input {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fcfdfc;
            font-size: 13px;
            outline: none;
            color: var(--text-main);
        }

        .update-btn {
            background: var(--primary-green);
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        /* Highlighting the Featured Cards like Donezo UI */
        .kpi-card.featured {
            background: var(--primary-green);
            color: white;
        }
        .kpi-card.featured .kpi-label { color: rgba(255,255,255,0.7); }
        .kpi-card.featured .kpi-val { color: white; }

        .kpi-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .kpi-val { font-size: 32px; font-weight: 700; display: block; margin-bottom: 12px; }

        /* Progress Bar inside KPI */
        .progress-wrap { height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-bar { height: 100%; background: var(--accent-green); border-radius: 10px; }

        /* Main Content Layout */
        .grid-row { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
        .panel { background: var(--card-bg); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .panel-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--primary-green); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid #f9f9f9; font-size: 13px; }
        tr:hover td { background: #fcfdfc; }

        #overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><p>Syncing Live Inventory Data...</p></div>

<div class="dashboard-container">
    <div class="header">
        <h1>Dashboard</h1>
        <div style="font-size: 12px; color: var(--accent-green);">● LIVE UPDATES</div>
    </div>

    <div class="filters">
        <div class="f-group"><label>Trainer</label><select id="f-trainer"><option value="">All Agents</option></select></div>
        <div class="f-group"><label>City</label><select id="f-city"><option value="">All Cities</option></select></div>
        <div class="f-group"><label>Status</label><select id="f-status"><option value="">All Status</option></select></div>
        <div class="f-group"><label>Date From</label><input type="date" id="f-from"></div>
        <div class="f-group"><label>Date To</label><input type="date" id="f-to"></div>
        <button class="update-btn" onclick="applyFilters()">Update View</button>
    </div>

    <div class="kpi-grid" id="kpi-row"></div>

    <div class="grid-row">
        <div class="panel">
            <div class="panel-title">Daily Training Volume</div>
            <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="panel">
            <div class="panel-title">Top Performers</div>
            <table>
                <thead><tr><th>Trainer</th><th>Done Count</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Trainer Status Matrix</div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Trainer</th><th>Done</th><th>Close</th><th>Virtual Done</th><th>Physical Visit</th><th>Total</th></tr>
                </thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHoSQQZ7IzKxkUhJtsrli6cSo00VR1q3TVlCTBdOrbJV8xEZaL2GUtc4SdjxEaWTq4ZQ/exec';

let allData = [];
let filteredData = [];
let charts = {};

async function init() {
    try {
        const res = await fetch(APPS_SCRIPT_URL);
        const json = await res.json();
        allData = normalize(json.data);
        populateFilters();
        applyFilters();
        document.getElementById('overlay').style.display = 'none';
    } catch (e) {
        alert("Connection Error. Ensure Apps Script deployment is set to 'Anyone'.");
    }
}

function normalize(raw) {
    return raw.map(r => {
        const get = (k) => String(r[k] || "").trim().toUpperCase();
        return {
            date: (r.Date || "").split('T')[0],
            trainer: get('Trainer Name') || get('Agent Name'),
            status: get('Status1') || get('Status'),
            mode: get('Category') || get('Training Mode'),
            city: get('City Name') || get('Restaurant Name')
        };
    }).filter(r => r.trainer && r.date);
}

function populateFilters() {
    const trainers = [...new Set(allData.map(r => r.trainer))].sort();
    const cities = [...new Set(allData.map(r => r.city))].sort();
    trainers.forEach(t => document.getElementById('f-trainer').add(new Option(t, t)));
    cities.forEach(c => document.getElementById('f-city').add(new Option(c, c)));
}

function applyFilters() {
    const t = document.getElementById('f-trainer').value;
    const c = document.getElementById('f-city').value;
    const fr = document.getElementById('f-from').value;
    const to = document.getElementById('f-to').value;

    filteredData = allData.filter(r => {
        if (t && r.trainer !== t) return false;
        if (c && r.city !== c) return false;
        if (fr && r.date < fr) return false;
        if (to && r.date > to) return false;
        return true;
    });
    render();
}

function render() {
    renderKPIs();
    renderLeaderboard();
    renderMatrix();
    renderChart();
}

function renderKPIs() {
    const total = filteredData.length;
    const done = filteredData.filter(r => r.status === 'DONE').length;
    const close = filteredData.filter(r => r.status === 'CLOSE').length;
    const virtual = filteredData.filter(r => r.status === 'DONE' && r.mode.includes('VIRTUAL')).length;
    const physical = filteredData.filter(r => r.status === 'DONE' && !r.mode.includes('VIRTUAL')).length;
    const notRelated = filteredData.filter(r => r.status.includes('NOT RELATED')).length;

    const data = [
        { label: 'Total Tickets', val: total, featured: true },
        { label: 'Done Calls', val: done },
        { label: 'Close Calls', val: close },
        { label: 'Not Related', val: notRelated },
        { label: 'Virtual Done', val: virtual },
        { label: 'Physical Visit', val: physical }
    ];

    document.getElementById('kpi-row').innerHTML = data.map(k => {
        const p = total > 0 ? (k.val / total * 100).toFixed(0) : 0;
        return `
            <div class="kpi-card ${k.featured ? 'featured' : ''}">
                <span class="kpi-label">${k.label}</span>
                <span class="kpi-val">${k.val.toLocaleString()}</span>
                <div class="progress-wrap"><div class="progress-bar" style="width:${p}%; background:${k.featured?'#74c69d':'#1d5c3d'}"></div></div>
            </div>
        `;
    }).join('');
}

function renderLeaderboard() {
    const map = {};
    filteredData.forEach(r => { if(r.status==='DONE') map[r.trainer] = (map[r.trainer] || 0) + 1; });
    const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0, 5);
    document.getElementById('leaderboard-body').innerHTML = sorted.map(s => `<tr><td>${s[0]}</td><td style="font-weight:700; color:var(--primary-green)">${s[1]}</td></tr>`).join('');
}

function renderMatrix() {
    const map = {};
    filteredData.forEach(r => {
        if(!map[r.trainer]) map[r.trainer] = {d:0, c:0, v:0, p:0, t:0};
        map[r.trainer].t++;
        if(r.status==='DONE') {
            map[r.trainer].d++;
            if(r.mode.includes('VIRTUAL')) map[r.trainer].v++; else map[r.trainer].p++;
        }
        if(r.status==='CLOSE') map[r.trainer].c++;
    });
    const sorted = Object.entries(map).sort((a,b) => b[1].t - a[1].t);
    document.getElementById('matrix-body').innerHTML = sorted.map(s => `
        <tr><td>${s[0]}</td><td>${s[1].d}</td><td>${s[1].c}</td><td>${s[1].v}</td><td>${s[1].p}</td><td style="font-weight:700;">${s[1].t}</td></tr>
    `).join('');
}

function renderChart() {
    const days = {};
    filteredData.forEach(r => { days[r.date] = (days[r.date] || 0) + 1; });
    const labels = Object.keys(days).sort();
    if(charts.main) charts.main.destroy();
    charts.main = new Chart(document.getElementById('mainChart'), {
        type: 'line',
        data: {
            labels: labels.map(l => l.split('-').slice(1).join('/')),
            datasets: [{ label: 'Tickets', data: labels.map(l => days[l]), borderColor: '#1d5c3d', tension: 0.4, fill: true, backgroundColor: 'rgba(29, 92, 61, 0.05)' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
    });
}

window.onload = init;
</script>
</body>
</html>
